<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../styles/estilos.css">
    <title>registerPage</title>
</head>

<body>
    <script src=""></script>
    <!--Header-->
    <div class="mainTittle">
        <h1>
            WorkWood
        </h1>
    </div>
    <!--Header-->

    <!--Formulario-->
    <div class="formulario">
        <!--Cliente/Usuario-->
        <div class="customer">
            <div class="logo">
                <img class="imgLogo" src="../Maquetado/user.png" alt="worker">
            </div>
            <div class="textoRegisterContainer">
                <p class="textoRegister">Quiero Contratar un Servicios</p>
            </div>
            <div class="formularioRegister">
                <input type="email" name="Correos" class="emailBox" placeholder="Email">
                <input type="password" name="Password" class="passwordBox" placeholder="Password">
            </div>
            <div class="buttonCustumer">
                <button onclick="" class="button">Registrarse</button>
            </div>
        </div>
        <!--Cliente/Usuario-->
        <!--Trabajador/Oficio-->
        <div class="worker">
            <div class="logo">
                <img class="imgLogo" src="../Maquetado\Icono_Registro_Trabajador.png" alt="worker">
            </div>
            <div class="textoRegisterContainer">
                <p class="textoRegister">Quiero Ofrecer mis Servicios</p>
            </div>
            <div class="formularioRegister">
                <input type="email" name="Correos" class="emailBox" placeholder="Email">
                <input type="password" name="Password" class="passwordBox" placeholder="Password">
            </div>
            <div class="buttonWorker">
                <button onclick="" class="button">Registrarse</button>
            </div>
        </div>
        <!--Trabajador/Oficio-->
    </div>
    <!--Formulario-->
</body>
<!--Header-->

</html>
