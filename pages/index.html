    <!-- TARJETA LOGIN -->
    <div 
    class="card-login">
      <h2>Iniciar sesión</h2>
      <form id="loginForm">
        <input type="email" id="email" placeholder="Correo" required>
        <input type="password" id="password" placeholder="Contraseña" required>
        <button type="submit">Entrar</button>
      </form>


      <p onclick="mostrarRegistro()">Crear cuenta</p>
    </div>

    <!-- TARJETA REGISTRO -->
    <div class="card-login" id="registro" style="display:none;">
      <h2>Crear cuenta</h2>
      <form id="registerForm">
        <input type="text" id="name" placeholder="Nombre" required>
        <input type="text" id="lastName" placeholder="Apellido" required>
        <input type="date" id="birthday" placeholder="Fecha de Nacimiento" required>
        <input type="email" id="regEmail" placeholder="Correo" required>
        <input type="password" id="password" placeholder="Contraseña" required>
        <button type="submit">Registrarse</button>
      </form>

      <p onclick="mostrarLogin()">Ya tengo cuenta</p>
    </div>

  </div>
</div>
